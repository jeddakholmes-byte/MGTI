<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <meta name="description" content="MGTI - 基于英雄联盟英雄人格的趣味测试，通过MBTI人格理论找到与你灵魂共鸣的本命英雄">

  <link rel="stylesheet" href="frontend/css/style.css">
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,600;14..32,700&display=swap"
    rel="stylesheet">
  <!-- 可选：添加 favicon -->
  <!-- <link rel="icon" type="image/x-icon" href="favicon.ico"> -->
</head>

<body>
  <div class="app-container">
    <main id="test-view" class="view active">
      <div class="hero-bg"></div>
      <div class="content-wrapper">
        <div class="brand">
          <h1>MGTI</h1>
          <p>英雄联盟·人格测试</p>
          <div class="brand-sub">—— 召唤你的本命英雄 ——</div>
        </div>

        <!-- 进度恢复提示横幅（默认隐藏，由 test.js 控制） -->
        <div id="resume-banner"
          style="display: none; background: rgba(226, 184, 107, 0.2); border: 1px solid #e2b86b; border-radius: 60px; padding: 0.8rem 1rem; margin-bottom: 1.5rem; text-align: center; backdrop-filter: blur(8px);">
          <span>📌 检测到未完成的测试，是否继续？</span>
          <button id="resume-yes"
            style="margin-left: 1rem; background: #e2b86b; border: none; border-radius: 40px; padding: 0.3rem 1rem; cursor: pointer; font-weight: bold;">继续</button>
          <button id="resume-no"
            style="margin-left: 0.5rem; background: transparent; border: 1px solid #e2b86b; border-radius: 40px; padding: 0.3rem 1rem; cursor: pointer;">重新开始</button>
        </div>

        <!-- 题目区域 -->
        <div id="question-area" class="question-card">
          <div class="loading">✨ 正在加载召唤师峡谷...</div>
        </div>

        <!-- 结果区域 -->
        <div id="result-area" class="result-card" style="display: none;">
          <!-- 动态渲染结果 -->
        </div>

        <div class="nav-links">
          <a href="catalog.html" class="btn-outline">📖 英雄图鉴</a>
        </div>

        <footer style="text-align: center; margin-top: 2rem; font-size: 0.7rem; opacity: 0.6;">
          <p>⚔️ 基于英雄联盟世界观 · MGTI 人格测试</p>
          <p>数据来源：英雄联盟宇宙 | 仅供娱乐与人格探索</p>
        </footer>
      </div>
    </main>
  </div>

  <script src="frontend/js/data.js"></script>
  <script src="frontend/js/test.js"></script>
