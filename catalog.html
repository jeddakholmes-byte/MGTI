<body data-page="catalog">
  <div class="app-container catalog-page">
    <header class="catalog-header">
      <h1>⚔️ 英雄图鉴</h1>
      <div class="mgti-subtitle">My Game Type Indicator</div>
      <p>
        探索符文之地的 MGTI 五维人格图谱 · 点击英雄卡片查看深度风格解析
        <span class="result-count" aria-live="polite"></span>
      </p>

      <div class="filter-bar" role="search" aria-label="英雄筛选与排序">
        <input type="text" id="search-input" class="search-input" placeholder="搜索英雄名称或别称（如：亚索、EZ、盲僧、劫）..."
          autocomplete="off" aria-label="搜索英雄名称或别称" inputmode="search">

        <select id="sort-filter" class="sort-filter" aria-label="选择英雄排序维度">
          <option value="default">默认排序</option>
          <option value="dominant">风格鲜明度</option>
          <option value="TAC">战术风格</option>
          <option value="TEA">团队角色</option>
          <option value="EMO">情绪反应</option>
          <option value="DEC">决策速度</option>
          <option value="PRE">英雄偏好</option>
        </select>

        <select id="dim-filter" class="dim-filter sort-filter" aria-label="按 MGTI 维度倾向筛选英雄">
          <option value="all">全部英雄</option>
          <option value="balanced">五维均衡型</option>
          <option value="extreme">风格鲜明型</option>
          <option value="TAC_high">战术风格｜谋略型 &gt; +0.5</option>
          <option value="TAC_low">战术风格｜直觉型 &lt; -0.5</option>
          <option value="TEA_high">团队角色｜团队核心 &gt; +0.5</option>
          <option value="TEA_low">团队角色｜独行侠 &lt; -0.5</option>
          <option value="EMO_high">情绪反应｜激情型 &gt; +0.5</option>
          <option value="EMO_low">情绪反应｜冷静型 &lt; -0.5</option>
          <option value="DEC_high">决策速度｜果敢型 &gt; +0.5</option>
          <option value="DEC_low">决策速度｜谨慎型 &lt; -0.5</option>
          <option value="PRE_high">英雄偏好｜高风险型 &gt; +0.5</option>
          <option value="PRE_low">英雄偏好｜传统型 &lt; -0.5</option>
        </select>
      </div>

      <div class="catalog-hint" style="margin-top: 0.9rem; color: #8d9db0; font-size: 0.85rem; line-height: 1.6;">
        支持按英雄名、称号、常用别称搜索。维度筛选可以快速找到“高谋略”“强团队”“高操作风险”等风格英雄。
      </div>
    </header>

    <main>
      <section id="champion-grid" class="champion-grid" aria-live="polite" aria-label="英雄图鉴列表">

    (function registerMGTIServiceWorker() {

          console.warn("[MGTI] Service Worker 注册失败：", error);
